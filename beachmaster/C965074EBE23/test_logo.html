<html>
<body>
<h1>Test Upload Logo</h1>
<form id="uploadForm">
  <input type="file" id="logoFile" accept="image/*" required>
  <button type="submit">Upload</button>
</form>
<div id="result"></div>
<script>
document.getElementById('uploadForm').onsubmit = async (e) => {
  e.preventDefault();
  const formData = new FormData();
  formData.append('logo', document.getElementById('logoFile').files[0]);
  
  try {
    const response = await fetch('api.php?action=admin_upload_logo', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer 55d8ff6fd75ed8fef3368622e52851901915a5c4'
      },
      body: formData
    });
    
    const data = await response.json();
    document.getElementById('result').textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    document.getElementById('result').textContent = 'Error: ' + err.message;
  }
};
</script>
</body>
</html>
