<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test System Sponsor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    .test-section {
      border: 1px solid #ddd;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      background: #f9f9f9;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background: #007bff;
      color: white;
    }
    button:hover {
      background: #0056b3;
    }
    .output {
      background: white;
      border: 1px solid #ccc;
      padding: 15px;
      margin: 10px 0;
      border-radius: 4px;
      font-family: monospace;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }
    .success {
      background: #d4edda;
      border-color: #c3e6cb;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      border-color: #f5c6cb;
      color: #721c24;
    }
    input, select {
      padding: 8px;
      margin: 5px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>🧪 Test Sistema Sponsor</h1>
  
  <div class="test-section">
    <h2>Test 1: Rendering Frontend (Array vs Object)</h2>
    <button onclick="testArrayHandling()">Esegui Test Array Handling</button>
    <div id="result1" class="output"></div>
  </div>

  <div class="test-section">
    <h2>Test 2: Generazione ID</h2>
    <button onclick="testIdGeneration()">Esegui Test ID Generation</button>
    <div id="result2" class="output"></div>
  </div>

  <div class="test-section">
    <h2>Test 3: Simulazione Salvataggio (Logica)</h2>
    <button onclick="testSaveLogic()">Esegui Test Save Logic</button>
    <div id="result3" class="output"></div>
  </div>

  <div class="test-section">
    <h2>Test 4: Aggiunta Sponsor</h2>
    <button onclick="testAddSponsor()">Aggiungi Sponsor</button>
    <button onclick="displayCurrentSponsors()">Visualizza Sponsor Attuali</button>
    <div id="result4" class="output"></div>
  </div>

  <script>
    let sponsors = [];

    function log(msg, success = true) {
      console.log(msg);
      return `${success ? '✅' : '❌'} ${msg}`;
    }

    function testArrayHandling() {
      const result = document.getElementById('result1');
      let output = log('Test: Handling di array con indici sparsi\n');
      
      // Simula l'array con buchi
      const updatedSponsors = {};
      updatedSponsors[0] = { name: 'Sponsor 1', repetitions: 1 };
      updatedSponsors[2] = { name: 'Sponsor 3', repetitions: 1 };
      updatedSponsors[4] = { name: 'Sponsor 5', repetitions: 1 };
      
      output += log('\nArray con buchi: ' + JSON.stringify(updatedSponsors));
      
      // Metodo corretto: convertire in array ordinato
      const finalSponsors = Object.keys(updatedSponsors)
        .sort((a, b) => parseInt(a) - parseInt(b))
        .map(key => updatedSponsors[key])
        .filter(s => s && s.name);
      
      output += log('\nArray ordinato e filtrato: ' + JSON.stringify(finalSponsors));
      output += log('\nLunghezza: ' + finalSponsors.length + ' (atteso: 3)');
      
      result.textContent = output;
      result.classList.add('success');
    }

    function testIdGeneration() {
      const result = document.getElementById('result2');
      let output = log('Test: Generazione ID Random\n');
      
      // Test generazione ID
      const ids = [];
      for (let i = 0; i < 5; i++) {
        const id = Math.random().toString(36).substring(2, 10);
        ids.push(id);
      }
      
      output += log('\nID generati:');
      ids.forEach((id, idx) => {
        output += log(`  ${idx + 1}. ${id}`);
      });
      
      output += log('\nTutti gli ID sono unici: ' + (new Set(ids).size === ids.length));
      
      result.textContent = output;
      result.classList.add('success');
    }

    function testSaveLogic() {
      const result = document.getElementById('result3');
      let output = log('Test: Logica Salvataggio Sponsor\n');
      
      // Setup iniziale
      sponsors = [
        { id: 's1', name: 'Nike', repetitions: 3 },
        { id: 's2', name: 'Adidas', repetitions: 2 },
        { id: 's3', name: 'Puma', repetitions: 1 }
      ];
      
      output += log('\nSponsors iniziali: ' + JSON.stringify(sponsors));
      
      // Simula modifica tramite form (array con buchi)
      const updatedSponsors = {};
      updatedSponsors[0] = { ...sponsors[0], name: 'Nike Updated' };
      updatedSponsors[1] = { ...sponsors[1], repetitions: 5 };
      // Skip index 2 (simulando eliminazione)
      updatedSponsors[3] = { id: 'newid', name: 'New Sponsor', repetitions: 1 };
      
      output += log('\nDopo modifica (con buchi):');
      output += log('  Object.keys: ' + Object.keys(updatedSponsors).join(', '));
      
      // Applica la logica di salvataggio
      const finalSponsors = Object.keys(updatedSponsors)
        .sort((a, b) => parseInt(a) - parseInt(b))
        .map(key => updatedSponsors[key])
        .filter(s => s && s.name);
      
      output += log('\nFinale (ordinato e filtrato): ' + JSON.stringify(finalSponsors));
      output += log('\nLunghezza finale: ' + finalSponsors.length + ' (atteso: 4)');
      
      result.textContent = output;
      result.classList.add('success');
    }

    function testAddSponsor() {
      const id = Math.random().toString(36).substring(2, 10);
      sponsors.push({
        id: id,
        name: 'Nuovo Sponsor ' + (sponsors.length + 1),
        repetitions: 1,
        logoFile: null
      });
      
      let output = `✅ Sponsor aggiunto:\n`;
      output += JSON.stringify(sponsors[sponsors.length - 1], null, 2);
      output += `\n\nTotale sponsor: ${sponsors.length}`;
      
      document.getElementById('result4').textContent = output;
      document.getElementById('result4').classList.remove('error');
      document.getElementById('result4').classList.add('success');
    }

    function displayCurrentSponsors() {
      let output = `📋 Sponsor attuali: ${sponsors.length}\n\n`;
      sponsors.forEach((s, idx) => {
        output += `${idx + 1}. ${s.name} (ripetizioni: ${s.repetitions})\n`;
      });
      
      document.getElementById('result4').textContent = output;
      document.getElementById('result4').classList.remove('error');
      document.getElementById('result4').classList.add('success');
    }

    // Auto-run all tests on page load
    window.addEventListener('load', () => {
      testArrayHandling();
      setTimeout(() => testIdGeneration(), 500);
      setTimeout(() => testSaveLogic(), 1000);
    });
  </script>
</body>
</html>
