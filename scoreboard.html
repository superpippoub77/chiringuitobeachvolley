<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabellone Elettronico</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      width: 100%;
      max-width: 1600px;
    }

    .team-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .team-name {
      font-size: clamp(24px, 6vw, 48px);
      font-weight: bold;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .score-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .score {
      font-size: clamp(80px, 20vw, 200px);
      font-weight: bold;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      text-shadow: 0 0 20px rgba(255, 165, 0, 0.8);
    }

    .set-display {
      font-size: clamp(32px, 8vw, 64px);
      font-weight: bold;
      color: #ffaa00;
      text-align: center;
    }

    .timeout-display {
      font-size: clamp(20px, 5vw, 40px);
      color: #00ff00;
      text-align: center;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
    }

    .btn-group {
      display: flex;
      gap: 15px;
    }

    .btn {
      flex: 1;
      padding: clamp(15px, 4vw, 30px);
      font-size: clamp(20px, 5vw, 40px);
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-plus {
      background: #00aa00;
      color: #000;
    }

    .btn-plus:hover {
      background: #00dd00;
    }

    .btn-minus {
      background: #cc0000;
      color: #fff;
    }

    .btn-minus:hover {
      background: #ff0000;
    }

    .btn-set {
      background: #ffaa00;
      color: #000;
      font-size: clamp(16px, 4vw, 32px);
    }

    .btn-set:hover {
      background: #ffdd00;
    }

    .btn-timeout {
      background: #0088ff;
      color: #fff;
      font-size: clamp(16px, 4vw, 32px);
    }

    .btn-timeout:hover {
      background: #00aaff;
    }

    .btn-reset {
      background: #666;
      color: #fff;
      font-size: clamp(14px, 3vw, 28px);
    }

    .btn-reset:hover {
      background: #888;
    }

    .match-info {
      text-align: center;
      color: #aaa;
      font-size: clamp(12px, 3vw, 20px);
      margin-bottom: 20px;
    }

    .center-section {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .set-selector {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .set-btn {
      padding: clamp(10px, 2vw, 20px);
      font-size: clamp(14px, 3vw, 24px);
      background: #333;
      color: #fff;
      border: 2px solid #666;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .set-btn.active {
      background: #ffaa00;
      color: #000;
      border-color: #ffdd00;
    }

    .loading {
      font-size: 24px;
      color: #ffaa00;
    }

    @media (max-width: 1200px) {
      .scoreboard {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .center-section {
        grid-column: 1;
      }
    }
  </style>
</head>
<body>
  <div class="match-info" id="matchInfo">Caricamento...</div>

  <div class="scoreboard" id="scoreboard">
    <div class="loading">Caricamento tabellone...</div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let match = null;
    let currentSet = 1;

    function getParam(name) {
      const url = new URL(window.location);
      return url.searchParams.get(name);
    }

    async function loadMatch() {
      const matchId = getParam('matchId');
      if (!matchId) {
        document.getElementById('scoreboard').innerHTML = '<div class="loading">ID partita non trovato</div>';
        return;
      }

      try {
        // Carica lo stato pubblico per ottenere i dati della partita
        const r = await fetch(`${API_BASE}/api.php?action=get_public`);
        const data = await r.json();
        
        match = (data.data.groupMatches || []).find(m => m.id === matchId);
        if (!match) {
          document.getElementById('scoreboard').innerHTML = '<div class="loading">Partita non trovata</div>';
          return;
        }

        renderScoreboard();
      } catch (err) {
        console.error('Errore caricamento:', err);
        document.getElementById('scoreboard').innerHTML = '<div class="loading">Errore caricamento</div>';
      }
    }

    function renderScoreboard() {
      const s1 = match.score1 ?? 0;
      const s2 = match.score2 ?? 0;

      const html = `
        <div class="team-section">
          <div class="team-name">${escapeHtml(match.team1Name)}</div>
          <div class="score-display">
            <div class="score" id="score1">${s1}</div>
            <div class="set-display">Set: <span id="sets1">0</span></div>
            <div class="timeout-display">Timeout: <span id="timeout1">0</span></div>
          </div>
          <div class="controls">
            <div class="btn-group">
              <button class="btn btn-plus" onclick="addPoint(1)">+ PUNTO</button>
              <button class="btn btn-minus" onclick="removePoint(1)">- PUNTO</button>
            </div>
            <div class="btn-group">
              <button class="btn btn-set" onclick="addSet(1)">+ SET</button>
              <button class="btn btn-timeout" onclick="addTimeout(1)">+ TIMEOUT</button>
            </div>
          </div>
        </div>

        <div class="team-section">
          <div class="team-name">${escapeHtml(match.team2Name)}</div>
          <div class="score-display">
            <div class="score" id="score2">${s2}</div>
            <div class="set-display">Set: <span id="sets2">0</span></div>
            <div class="timeout-display">Timeout: <span id="timeout2">0</span></div>
          </div>
          <div class="controls">
            <div class="btn-group">
              <button class="btn btn-plus" onclick="addPoint(2)">+ PUNTO</button>
              <button class="btn btn-minus" onclick="removePoint(2)">- PUNTO</button>
            </div>
            <div class="btn-group">
              <button class="btn btn-set" onclick="addSet(2)">+ SET</button>
              <button class="btn btn-timeout" onclick="addTimeout(2)">+ TIMEOUT</button>
            </div>
          </div>
        </div>

        <div class="center-section">
          <div style="font-size: clamp(16px, 4vw, 32px); color: #aaa">
            Girone ${escapeHtml(match.group)} • Giorno ${match.day} • Ora ${escapeHtml(match.time)}
          </div>
          <div style="display: flex; gap: 10px; width: 100%; justify-content: center">
            <button class="btn btn-reset" onclick="resetMatch()" style="flex: 1; max-width: 200px">Reset Partita</button>
            <button class="btn btn-reset" onclick="resetSets()" style="flex: 1; max-width: 200px">Reset Set</button>
          </div>
        </div>
      `;

      document.getElementById('scoreboard').innerHTML = html;
      document.getElementById('matchInfo').innerHTML = `<strong>${escapeHtml(match.team1Name)} vs ${escapeHtml(match.team2Name)}</strong> • Partita ID: ${match.id}`;
    }

    async function updateMatch() {
      try {
        await fetch(`${API_BASE}/api.php?action=admin_update_group_match`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer admin123'
          },
          body: JSON.stringify({
            id: match.id,
            score1: match.score1,
            score2: match.score2
          })
        });
      } catch (err) {
        console.error('Errore aggiornamento:', err);
      }
    }

    function addPoint(team) {
      if (team === 1) {
        match.score1 = (match.score1 ?? 0) + 1;
        document.getElementById('score1').textContent = match.score1;
      } else {
        match.score2 = (match.score2 ?? 0) + 1;
        document.getElementById('score2').textContent = match.score2;
      }
      updateMatch();
    }

    function removePoint(team) {
      if (team === 1) {
        match.score1 = Math.max(0, (match.score1 ?? 0) - 1);
        document.getElementById('score1').textContent = match.score1;
      } else {
        match.score2 = Math.max(0, (match.score2 ?? 0) - 1);
        document.getElementById('score2').textContent = match.score2;
      }
      updateMatch();
    }

    function addSet(team) {
      // In questa versione semplificata, mostriamo solo un messaggio
      // In futuro potrebbe gestire set multipli
      alert('Funzionalità set implementata nel tabellone base. Aggiorna il punteggio manualmente.');
    }

    function addTimeout(team) {
      alert('Timeout registrato per la squadra ' + team);
      // In futuro integrerà con la gestione dei timeout
    }

    function resetMatch() {
      if (confirm('Reset della partita? Confermi?')) {
        match.score1 = 0;
        match.score2 = 0;
        document.getElementById('score1').textContent = '0';
        document.getElementById('score2').textContent = '0';
        updateMatch();
      }
    }

    function resetSets() {
      if (confirm('Reset dei set? Confermi?')) {
        match.score1 = 0;
        match.score2 = 0;
        document.getElementById('score1').textContent = '0';
        document.getElementById('score2').textContent = '0';
        updateMatch();
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    // Carica la partita al caricamento della pagina
    loadMatch();

    // Auto-refresh ogni 2 secondi per sincronizzarsi con eventuali cambiamenti esterni
    setInterval(() => {
      loadMatch();
    }, 2000);
  </script>
</body>
</html>
