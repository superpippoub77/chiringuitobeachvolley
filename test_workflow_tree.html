<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Workflow Tree Visualization</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f0f0f0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌳 Test: Workflow Tree Visualization</h1>
    <div id="tree-output"></div>
  </div>

  <script>
    // Mock data
    const config = {
      tournament: { maxTeams: 16 },
      phases: [
        {
          phaseNumber: 1,
          name: "Gironi Preliminari",
          type: "groups",
          numGroups: 4,
          teamsAdvance: 2,
          hasRepescage: true,
          branch: "root",
          qualifiedGoTo: "Tabellone Winners (8 squadre)",
          eliminatedGoTo: "Girone di Ripescaggio"
        },
        {
          phaseNumber: 2,
          name: "Girone di Ripescaggio",
          type: "groups",
          numGroups: 2,
          teamsAdvance: 2,
          hasRepescage: false,
          branch: "eliminated",
          qualifiedGoTo: "Tabellone Losers (4 squadre)",
          eliminatedGoTo: "Fuori dal torneo"
        },
        {
          phaseNumber: 3,
          name: "Tabellone Winners",
          type: "knockout",
          numTeams: 8,
          branch: "qualified",
          qualifiedGoTo: "Semifinale Winners",
          eliminatedGoTo: "Tabellone Losers"
        }
      ]
    };

    const state = {
      teams: [
        { approved: true }, { approved: true }, { approved: true }, { approved: true },
        { approved: true }, { approved: true }, { approved: true }, { approved: true },
        { approved: true }, { approved: true }, { approved: true }, { approved: true },
        { approved: true }, { approved: true }, { approved: true }, { approved: true }
      ]
    };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderPhaseWorkflowTree() {
      const phases = config.phases || [];
      if (phases.length === 0) return '';

      const approvedCount = (state.teams || []).filter(t => t.approved === true).length;
      const totalTeams = approvedCount > 0 ? approvedCount : (config.tournament?.maxTeams || 16);

      let html = `
        <div style="background: #f9f3e6; border-radius: 8px; padding: 16px; margin-bottom: 16px; overflow-x: auto">
          <h4 style="margin: 0 0 16px 0; color: #6b5d45">🌳 Workflow Torneo - Albero Diramazioni</h4>
          <div style="display: flex; gap: 0; align-items: flex-start; flex-wrap: wrap; min-height: 400px; position: relative">
      `;

      let processedPhases = new Set();
      let treeHtml = '';

      function renderTreeNode(phaseIdx, branch, teamsIn, depth = 0, parentX = 0) {
        const nodeKey = `${phaseIdx}-${branch}`;
        if (processedPhases.has(nodeKey)) return { html: '', nextTeams: 0 };

        processedPhases.add(nodeKey);

        if (phaseIdx >= phases.length) return { html: '', nextTeams: 0 };

        const phase = phases[phaseIdx];
        if (phase.branch !== branch && !(phaseIdx === 0 && branch === 'root')) return { html: '', nextTeams: 0 };

        // Calcola squadre qualificate e eliminate
        let teamStats = {};
        if (phase.type === 'groups') {
          const numGroups = phase.numGroups || 4;
          const teamsAdvance = phase.teamsAdvance || 2;
          const qualified = numGroups * teamsAdvance;
          const eliminated = Math.max(0, teamsIn - qualified);
          teamStats = { qualified, eliminated };
        } else {
          teamStats = { qualified: Math.ceil(teamsIn / 2), eliminated: Math.floor(teamsIn / 2) };
        }

        const bgColor = branch === 'qualified' ? '#e8f5e9' : (branch === 'eliminated' ? '#fff3e0' : '#f0f8ff');
        const borderColor = branch === 'qualified' ? '#2ecc71' : (branch === 'eliminated' ? '#ff9800' : '#0078d4');
        const titleColor = branch === 'qualified' ? '#2ecc71' : (branch === 'eliminated' ? '#ff9800' : '#0078d4');

        let nodeHtml = `
          <div style="
            background: ${bgColor}; 
            border: 3px solid ${borderColor}; 
            border-radius: 8px; 
            padding: 12px 14px; 
            min-width: 240px; 
            margin: 0 16px 24px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
            position: relative;
          ">
            <div style="font-weight: bold; color: ${titleColor}; margin-bottom: 8px; font-size: 14px">
              ${branch === 'root' ? '📥' : (branch === 'qualified' ? '✅' : '❌')} 
              ${escapeHtml(phase.name)}
            </div>
            <div style="font-size: 12px; line-height: 1.6; color: #333">
              <div><span style="color: #666">📥 In ingresso:</span> <strong>${teamsIn} squadre</strong></div>
              <div style="color: #2ecc71; margin-top: 4px">✓ Qualificate: <strong>${teamStats.qualified}</strong></div>
              ${phase.hasRepescage && teamStats.eliminated > 0 ? 
                `<div style="color: #ff9800; margin-top: 2px">⟳ Ripescaggio: <strong>${teamStats.eliminated}</strong></div>` : 
                (teamStats.eliminated > 0 ? `<div style="color: #d13438; margin-top: 2px">✗ Eliminate: <strong>${teamStats.eliminated}</strong></div>` : '')
              }
            </div>
            ${phase.qualifiedGoTo ? `
              <div style="font-size: 11px; color: #666; margin-top: 8px; padding-top: 8px; border-top: 1px solid ${borderColor}">
                <small>📍 Qualificate → ${escapeHtml(phase.qualifiedGoTo)}</small>
              </div>
            ` : ''}
            ${phase.eliminatedGoTo ? `
              <div style="font-size: 11px; color: #666; margin-top: 4px">
                <small>📍 ${phase.hasRepescage ? 'Ripescaggio' : 'Eliminate'} → ${escapeHtml(phase.eliminatedGoTo)}</small>
              </div>
            ` : ''}
          </div>
        `;

        // Trova fasi successive in base al ramo
        let nextNodes = `<div style="display: flex; gap: 0; align-items: flex-start; flex-wrap: wrap; margin-left: 24px">`;
        let hasChildren = false;

        for (let nextIdx = phaseIdx + 1; nextIdx < phases.length; nextIdx++) {
          const nextPhase = phases[nextIdx];
          
          if (nextPhase.branch === 'qualified' && branch === 'root') {
            hasChildren = true;
            const childResult = renderTreeNode(nextIdx, 'qualified', teamStats.qualified, depth + 1, depth);
            nextNodes += childResult.html;
          } else if (nextPhase.branch === 'eliminated' && branch === 'root' && phase.hasRepescage) {
            hasChildren = true;
            const childResult = renderTreeNode(nextIdx, 'eliminated', teamStats.eliminated, depth + 1, depth);
            nextNodes += childResult.html;
          }
        }
        nextNodes += '</div>';

        return {
          html: `
            <div style="display: flex; flex-direction: column">
              ${nodeHtml}
              ${hasChildren ? `
                <div style="margin-left: 12px; padding-left: 12px; border-left: 2px dashed #999">
                  ${nextNodes}
                </div>
              ` : ''}
            </div>
          `,
          nextTeams: teamStats.qualified
        };
      };

      // Render la radice (prima fase)
      if (phases.length > 0 && phases[0].branch === 'root') {
        const firstPhase = phases[0];
        let teamStats = {};
        if (firstPhase.type === 'groups') {
          const numGroups = firstPhase.numGroups || 4;
          const teamsAdvance = firstPhase.teamsAdvance || 2;
          const qualified = numGroups * teamsAdvance;
          const eliminated = Math.max(0, totalTeams - qualified);
          teamStats = { qualified, eliminated };
        } else {
          teamStats = { qualified: Math.ceil(totalTeams / 2), eliminated: Math.floor(totalTeams / 2) };
        }

        const treeResult = renderTreeNode(0, 'root', totalTeams, 0);
        treeHtml = treeResult.html;
      }

      html += `
        <div style="display: flex; flex-direction: column; gap: 16px">
          ${treeHtml}
        </div>
      `;

      html += '</div></div>';
      return html;
    }

    // Render
    const output = document.getElementById('tree-output');
    output.innerHTML = renderPhaseWorkflowTree();
  </script>
</body>
</html>
